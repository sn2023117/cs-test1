<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route & Rest: 여가 시간 활용 도우미</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Route & Rest</h1>
        <p>당신의 자투리 시간을 가치 있게</p>
    </div>

    <div class="card">
        <h2>📍 현재 상황</h2>
        <label>출발지 -> 목적지</label>
        <select id="route">
            <option value="집-학교">🏠 집 ➔ 🏫 학교</option>
            <option value="학교-알바">🏫 학교 ➔ ☕ 알바</option>
            <option value="알바-집">☕ 알바 ➔ 🏠 집</option>
        </select>

        <label>여유 시간 (분)</label>
        <input type="number" id="freeTime" placeholder="예: 120">

        <label>편도 이동 시간 (분)</label>
        <input type="number" id="travelTime" placeholder="예: 30">

        <label>편도 교통비 (원)</label>
        <input type="number" id="cost" placeholder="예: 1500">

        <button onclick="analyze()" class="btn-main">⚡ 분석 및 결과 보기</button>
    </div>

    <div class="card">
        <h2>📝 장소별 할 일 추가</h2>
        <input type="text" id="taskName" placeholder="할 일 입력 (예: 과제하기)">
        <input type="number" id="taskTime" placeholder="소요 시간(분)">
        <button onclick="addTask()" class="btn-sub">리스트에 추가</button>
        <div id="taskList"></div>
    </div>

    <div class="card" id="result-card">
        <h2>📊 분석 결과</h2>
        <div id="initial-msg">상황을 입력하고 분석 버튼을 눌러주세요.</div>
        <div id="result-area">
            <div class="result-item">실제 활용 가능 시간: <span id="res-time" class="highlight">0</span>분</div>
            <div class="result-item">왕복 교통비: <span id="res-cost" class="highlight">0</span>원</div>
            <div class="recommendation">
                <strong>💡 추천 활동:</strong>
                <div id="res-tasks"></div>
            </div>
            <div id="res-place" class="place-tip"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
