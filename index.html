<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route & Rest</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Pretendard, sans-serif;
    background:linear-gradient(135deg,#d7d2ff,#8e8ffa);
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:25px;
}

.header h1{
    font-size:2.2rem;
}

.page{
    display:block;
}

.hidden{
    display:none;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.card h2{
    color:#5f5ae6;
    margin-bottom:15px;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:12px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#6c63ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#574fe0;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.stat-card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.stat-value{
    font-size:2rem;
    font-weight:bold;
    color:#5f5ae6;
}

.stat-label{
    color:#666;
    margin-top:8px;
}

.task-item{
    display:flex;
    justify-content:space-between;
    background:#f5f5ff;
    padding:10px;
    border-radius:10px;
    margin-top:8px;
}

.recommend-card{
    background:white;
    border-radius:15px;
    padding:15px;
    margin-top:10px;
    border-left:6px solid #6c63ff;
}

.back-btn{
    margin-top:15px;
    background:#888;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Route & Rest</h1>
<p>남는 시간을 가장 가치 있게</p>
</div>

<!-- 입력 페이지 -->
<div id="inputPage" class="page">

<div class="card">

<h2>현재 상황</h2>

<select id="start">
<option>집</option>
<option>학교</option>
<option>알바</option>
</select>

<select id="destination">
<option>집</option>
<option>학교</option>
<option>알바</option>
</select>

<input type="number" id="freeTime"
placeholder="다음 일정까지 남은 시간(분)">

<input type="number" id="travelTime"
placeholder="편도 이동 시간(분)">

<input type="number" id="cost"
placeholder="편도 교통비(원)">

<input type="number" id="mealHour"
placeholder="마지막 식사 후 경과시간(시간)">

<button onclick="analyze()">
분석 시작
</button>

</div>

<div class="card">

<h2>장소별 할 일 추가</h2>

<select id="taskPlace">
<option>집</option>
<option>학교</option>
<option>알바</option>
</select>

<input type="text"
id="taskName"
placeholder="할 일">

<input type="number"
id="taskTime"
placeholder="예상 소요시간(분)">

<input type="number"
id="taskPriority"
placeholder="우선순위 (1~5)">

<button onclick="addTask()">
할 일 저장
</button>

<div id="taskList"></div>

</div>

</div>

<!-- 결과 페이지 -->
<div id="resultPage" class="hidden">

<div class="dashboard">

<div class="stat-card">
<div class="stat-value" id="timeResult">0</div>
<div class="stat-label">활용 가능 시간</div>
</div>

<div class="stat-card">
<div class="stat-value" id="costResult">0</div>
<div class="stat-label">왕복 교통비</div>
</div>

<div class="stat-card">
<div class="stat-value" id="mealResult">낮음</div>
<div class="stat-label">식사 필요도</div>
</div>

<div class="stat-card">
<div class="stat-value" id="scoreResult">0%</div>
<div class="stat-label">집 이동 추천도</div>
</div>

</div>

<div class="card">

<h2>추천 행동</h2>

<div id="recommendTasks"></div>

</div>

<div class="card">

<h2>주변 추천 시설</h2>

<div id="facilityResult"></div>

</div>

<button
class="back-btn"
onclick="goBack()">
다시 분석하기
</button>

</div>

</div>

<script>

let tasks=[];

const facilities={
집:["GS25","메가커피","도서관"],
학교:["스터디카페","편의점","열람실"],
알바:["CU","카페","헬스장"]
};

function addTask(){

const place=
document.getElementById("taskPlace").value;

const name=
document.getElementById("taskName").value;

const time=
Number(
document.getElementById("taskTime").value
);

const priority=
Number(
document.getElementById("taskPriority").value
);

if(!name || !time) return;

tasks.push({
place,
name,
time,
priority
});

renderTasks();

}

function renderTasks(){

let html="";

tasks.forEach(task=>{

html+=`
<div class="task-item">
<span>
${task.place} | ${task.name}
</span>
<span>
${task.time}분
</span>
</div>
`;

});

document.getElementById("taskList").innerHTML=html;

}

function analyze(){

const free=
Number(
document.getElementById("freeTime").value
);

const travel=
Number(
document.getElementById("travelTime").value
);

const cost=
Number(
document.getElementById("cost").value
);

const mealHour=
Number(
document.getElementById("mealHour").value
);

const destination=
document.getElementById("destination").value;

let realTime=
free-(travel*2);

let mealNeed="낮음";

if(mealHour>=5){
mealNeed="높음";
realTime-=30;
}
else if(mealHour>=3){
mealNeed="보통";
realTime-=15;
}

const possible=
tasks
.filter(t=>t.time<=realTime)
.sort((a,b)=>b.priority-a.priority);

let recommendHtml="";

if(possible.length===0){

recommendHtml=
`
<div class="recommend-card">
휴식을 추천합니다.
</div>
`;
}
else{

possible.forEach(task=>{

recommendHtml+=`
<div class="recommend-card">
<b>${task.name}</b><br>
${task.place}<br>
소요시간 ${task.time}분<br>
우선순위 ${task.priority}
</div>
`;

});
}

let score=
Math.min(
100,
Math.max(
0,
Math.round((realTime/free)*100)
)
);

document.getElementById("timeResult")
.innerText=realTime+"분";

document.getElementById("costResult")
.innerText=(cost*2).toLocaleString()+"원";

document.getElementById("mealResult")
.innerText=mealNeed;

document.getElementById("scoreResult")
.innerText=score+"%";

document.getElementById("recommendTasks")
.innerHTML=recommendHtml;

document.getElementById("facilityResult")
.innerHTML=
facilities[destination]
.map(item=>`• ${item}`)
.join("<br>");

document.getElementById("inputPage")
.classList.add("hidden");

document.getElementById("resultPage")
.classList.remove("hidden");

}

function goBack(){

document.getElementById("resultPage")
.classList.add("hidden");

document.getElementById("inputPage")
.classList.remove("hidden");

}

</script>

</body>
</html>
