<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간 활용 도우미</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background-color: #f4f4f4;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    padding:10px 15px;
    cursor:pointer;
}

#result{
    font-size:18px;
    line-height:1.8;
}
</style>
</head>

<body>

<h1>시간 활용 도우미</h1>

<div class="card">

<h2>현재 상황 입력</h2>

<label>현재 위치</label>
<select id="location">
    <option>집</option>
    <option>학교</option>
    <option>알바</option>
</select>

<label>다음 일정까지 남은 시간(분)</label>
<input type="number" id="freeTime">

<label>편도 이동시간(분)</label>
<input type="number" id="travelTime">

<label>편도 교통비(원)</label>
<input type="number" id="cost">

<label>배고픔 정도</label>
<select id="hungry">
    <option>안 배고픔</option>
    <option>보통</option>
    <option>배고픔</option>
</select>

<button onclick="analyze()">분석하기</button>

</div>

<div class="card">

<h2>할 일 추가</h2>

<input type="text" id="taskName" placeholder="예: 과제">
<input type="number" id="taskTime" placeholder="예: 90">

<button onclick="addTask()">추가</button>

<ul id="taskList"></ul>

</div>

<div class="card">

<h2>결과</h2>

<div id="result">
분석 결과가 여기에 표시됩니다.
</div>

</div>

<script>

let tasks = [];

function addTask(){

    let name =
    document.getElementById("taskName").value;

    let time =
    Number(document.getElementById("taskTime").value);

    if(name === "" || time <= 0){
        return;
    }

    tasks.push({
        name:name,
        time:time
    });

    renderTasks();

    document.getElementById("taskName").value="";
    document.getElementById("taskTime").value="";
}

function renderTasks(){

    let list =
    document.getElementById("taskList");

    list.innerHTML="";

    for(let task of tasks){

        list.innerHTML +=
        `<li>${task.name} (${task.time}분)</li>`;
    }
}

function analyze(){

    let free =
    Number(document.getElementById("freeTime").value);

    let travel =
    Number(document.getElementById("travelTime").value);

    let cost =
    Number(document.getElementById("cost").value);

    let hungry =
    document.getElementById("hungry").value;

    let realTime =
    free - (travel * 2);

    let meal = "불필요";

    if(hungry === "배고픔"){
        realTime -= 30;
        meal = "권장";
    }

    let possible = [];

    for(let task of tasks){

        if(task.time <= realTime){
            possible.push(task.name);
        }
    }

    document.getElementById("result").innerHTML =

    `
    실제 활용 가능 시간 : <b>${realTime}</b>분<br><br>

    예상 왕복 교통비 : <b>${cost*2}</b>원<br><br>

    식사 여부 : <b>${meal}</b><br><br>

    가능한 활동 :<br>
    ${possible.length ? possible.join("<br>") : "추천 활동 없음"}
    `;
}

</script>

</body>
</html>
