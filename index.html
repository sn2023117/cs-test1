<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route & Rest: 여가 시간 활용 도우미</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-color: #a29bfe;
            --secondary-color: #74b9ff;
            --text-color: #2d3436;
            --accent-color: #ff7675;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #4834d4;
            margin-bottom: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        h2 { font-size: 1.1rem; margin-top: 0; color: #686de0; }

        label { display: block; font-size: 0.85rem; margin-bottom: 5px; color: #7f8c8d; }

        select, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #dfe6e9;
            border-radius: 10px;
            background: #f9f9f9;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary-color);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #6c5ce7; }

        .task-item {
            background: #f1f2f6;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        #result-area {
            background: #ebf3ff;
            border-left: 5px solid var(--secondary-color);
            padding: 15px;
            border-radius: 10px;
            display: none; /* 분석 전에는 숨김 */
        }

        .highlight { color: var(--accent-color); font-weight: bold; }
        
        .recommendation {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #ced4da;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Route & Rest</h1>
        <p>당신의 자투리 시간을 가치 있게</p>
    </div>

    <div class="card">
        <h2>📍 현재 상황</h2>
        <label>출발지 -> 목적지</label>
        <select id="route">
            <option value="집-학교">🏠 집 ➔ 🏫 학교</option>
            <option value="학교-알바">🏫 학교 ➔ ☕ 알바</option>
            <option value="알바-집">☕ 알바 ➔ 🏠 집</option>
        </select>

        <label>여유 시간 (분)</label>
        <input type="number" id="freeTime" placeholder="예: 120">

        <label>편도 이동 시간 (분)</label>
        <input type="number" id="travelTime" placeholder="예: 30">

        <label>편도 교통비 (원)</label>
        <input type="number" id="cost" placeholder="예: 1500">

        <button onclick="analyze()">⚡ 분석 및 결과 보기</button>
    </div>

    <div class="card">
        <h2>📝 장소별 할 일 추가</h2>
        <input type="text" id="taskName" placeholder="할 일 입력 (예: 과제하기)">
        <input type="number" id="taskTime" placeholder="소요 시간(분)">
        <button onclick="addTask()" style="background: var(--secondary-color);">리스트에 추가</button>
        <div id="taskList" style="margin-top:15px;"></div>
    </div>

    <div class="card" id="result-card">
        <h2>📊 분석 결과</h2>
        <div id="initial-msg">상황을 입력하고 분석 버튼을 눌러주세요.</div>
        <div id="result-area">
            <div>실제 활용 가능 시간: <span id="res-time" class="highlight">0</span>분</div>
            <div>왕복 교통비: <span id="res-cost" class="highlight">0</span>원</div>
            <div class="recommendation">
                <strong>💡 추천 활동:</strong>
                <div id="res-tasks" style="margin-top:10px;"></div>
            </div>
            <div id="res-place" style="margin-top:10px; font-size: 0.85rem; color: #636e72;"></div>
        </div>
    </div>
</div>

<script>
    let tasks = [
        { name: "단어 외우기", time: 15 },
        { name: "독서", time: 30 }
    ];

    function addTask() {
        const name = document.getElementById("taskName").value;
        const time = Number(document.getElementById("taskTime").value);
        if(!name || !time) return;
        
        tasks.push({ name, time });
        renderTasks();
        document.getElementById("taskName").value = "";
        document.getElementById("taskTime").value = "";
    }

    function renderTasks() {
        const listDiv = document.getElementById("taskList");
        listDiv.innerHTML = tasks.map(t => `
            <div class="task-item">
                <span>${t.name}</span>
                <span>${t.time}분</span>
            </div>
        `).join('');
    }

    function analyze() {
        const free = Number(document.getElementById("freeTime").value);
        const travel = Number(document.getElementById("travelTime").value);
        const cost = Number(document.getElementById("cost").value);
        
        // 1. 왕복 시간 계산 (상호작용 결과 1)
        const realTime = free - (travel * 2);
        
        if (realTime < 0) {
            alert("이동 시간보다 여유 시간이 짧습니다!");
            return;
        }

        // UI 변화 (상호작용 결과 2)
        document.getElementById("initial-msg").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        
        document.getElementById("res-time").innerText = realTime;
        document.getElementById("res-cost").innerText = (cost * 2).toLocaleString();

        // 2. 가용 시간에 따른 할 일 필터링
        const possible = tasks.filter(t => t.time <= realTime);
        const taskHtml = possible.length > 0 
            ? possible.map(t => `✅ ${t.name} (${t.time}분)`).join('<br>')
            : "시간 내에 할 수 있는 일이 없습니다. 휴식을 추천해요!";
        
        document.getElementById("res-tasks").innerHTML = taskHtml;

        // 3. 편의시설 추천 (기능 3 반영)
        let placeMsg = "";
        if (realTime >= 60) {
            placeMsg = "📍 시간이 넉넉하네요! 주변 <b>스터디카페</b>나 <b>도서관</b>을 추천합니다.";
        } else if (realTime >= 30) {
            placeMsg = "📍 잠깐 시간이 남네요. 주변 <b>카페</b>나 <b>편의점</b>은 어떠신가요?";
        }
        document.getElementById("res-place").innerHTML = placeMsg;
    }

    // 초기 리스트 렌더링
    renderTasks();
</script>

</body>
</html>
