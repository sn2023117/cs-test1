          <label class="input-label">🔎 저장/더미 경로 검색</label>
          <input type="search" id="route-search" class="input-field" placeholder="예: 숭실대입구역, 부개역, 학교" oninput="renderRouteLibrary()" />
          <div id="saved-route-list" class="route-list"></div>
          <div id="route-data-note" class="route-note"></div>

          <label class="input-label">🚌 이동 수단</label>
          <div class="transport-pills">
            <button class="pill active" data-transport="bus" onclick="selectTransport(this)">🚌 버스</button>
            <button class="pill" data-transport="subway" onclick="selectTransport(this)">🚇 지하철</button>
            <button class="pill" data-transport="walk" onclick="selectTransport(this)">🚶 도보</button>
            <button class="pill" data-transport="taxi" onclick="selectTransport(this)">🚕 택시</button>
          </div>

          <label class="input-label">⏱️ 공강 시간 (분)</label>
          <input type="number" id="free-minutes" class="input-field" placeholder="예: 90" min="10" max="300" />

          <label class="input-label">🏠 집에서 머무르는 시간 (분)</label>
          <input type="number" id="home-stay" class="input-field" placeholder="예: 30" min="0" max="120" value="30" />

          <button class="btn-calc" onclick="calcTravel()">계산하기 ✨</button>
        </div>

        <div id="travel-result" class="result-card hidden">
          <div class="result-header" id="travel-verdict"></div>
                    <div class="route-summary" id="route-summary"></div>
          <div class="result-grid">
            <div class="result-item">
              <div class="result-item-icon">🕐</div>
              <div class="result-item-label">편도 시간</div>
              <div class="result-item-val" id="r-one-way"></div>
            </div>
            <div class="result-item">
              <div class="result-item-icon">🔄</div>
              <div class="result-item-label">왕복 시간</div>
              <div class="result-item-val" id="r-round-trip"></div>
            </div>
            <div class="result-item">
              <div class="result-item-icon">💰</div>
              <div class="result-item-label">왕복 요금</div>
              <div class="result-item-val" id="r-cost"></div>
            </div>
            <div class="result-item">
              <div class="result-item-icon">🏠</div>
              <div class="result-item-label">여유 시간</div>
              <div class="result-item-val" id="r-margin"></div>
            </div>
          </div>
          <div class="suggestion-box" id="travel-suggestion"></div>
        </div>

        <div class="card" style="margin-top:16px;">
          <div class="section-title" style="margin:0 0 12px">💳 선택 경로 교통비 상세</div>
          <div class="cost-row">
            <span id="cost-row-1-label">기본요금</span><span class="cost-val" id="cost-row-1-val">—</span>
          </div>
          <div class="cost-row">
            <span id="cost-row-2-label">거리/환승 반영</span><span class="cost-val" id="cost-row-2-val">—</span>
          </div>
          <div class="cost-row">
            <span id="cost-row-3-label">데이터 출처</span><span class="cost-val" id="cost-row-3-val">더미 데이터</span>
          </div>
          <div class="cost-row total">
            <span>예상 왕복 합계</span><span class="cost-val" id="cost-total-display">—</span>
          </div>
          <p class="cost-note">* 실제 요금은 거리·환승에 따라 달라질 수 있어요</p>
        </div>
      </div>

      <!-- ── NEARBY ── -->
      <div id="page-nearby" class="page">
        <div class="page-header">
          <h2>📍 주변 편의시설</h2>
          <p class="page-desc">공강 시간을 알차게 보낼 장소를 찾아요</p>
        </div>

        <div class="filter-row">
          <button class="filter-btn active" data-cat="all" onclick="filterNearby(this, 'all')">전체</button>
          <button class="filter-btn" data-cat="cafe" onclick="filterNearby(this, 'cafe')">☕ 카페</button>
          <button class="filter-btn" data-cat="study" onclick="filterNearby(this, 'study')">📚 스터디</button>
          <button class="filter-btn" data-cat="convenience" onclick="filterNearby(this, 'convenience')">🏪 편의점</button>
          <button class="filter-btn" data-cat="food" onclick="filterNearby(this, 'food')">🍜 식당</button>
        </div>

        <div class="free-time-bar">
          <span>⏱️ 남은 공강</span>
          <input type="number" id="nearby-free-min" class="inline-input" value="60" min="10" max="300" onchange="renderNearby()" />
          <span>분</span>
        </div>

        <div id="nearby-list" class="nearby-grid"></div>
      </div>

      <!-- ── TASKS ── -->
      <div id="page-tasks" class="page">
        <div class="page-header">
          <h2>📋 위치별 할 일</h2>
          <p class="page-desc">장소에 따라 할 일을 관리하고 우선순위를 확인해요</p>
        </div>

        <div class="card add-task-card">
          <div class="section-title" style="margin:0 0 12px">➕ 할 일 추가</div>
          <input type="text" id="task-title" class="input-field" placeholder="할 일을 입력하세요" />

          <label class="input-label">📍 장소</label>
          <div class="transport-pills">
            <button class="pill active" data-loc="home" onclick="selectLoc(this)">🏠 집</button>
            <button class="pill" data-loc="school" onclick="selectLoc(this)">🏫 학교</button>
            <button class="pill" data-loc="anywhere" onclick="selectLoc(this)">🌍 어디서나</button>
          </div>

          <label class="input-label">🔥 우선순위</label>
          <div class="priority-pills">
            <button class="priority-pill urgent active" data-pri="urgent" onclick="selectPri(this)">긴급</button>
            <button class="priority-pill high" data-pri="high" onclick="selectPri(this)">높음</button>
            <button class="priority-pill mid" data-pri="mid" onclick="selectPri(this)">보통</button>
            <button class="priority-pill low" data-pri="low" onclick="selectPri(this)">낮음</button>
          </div>

          <label class="input-label">📅 마감일 (선택)</label>
          <input type="date" id="task-due" class="input-field" />

          <label class="input-label">🍽️ 식사 후 해야 하나요?</label>
          <div class="transport-pills">
            <button class="pill active" data-meal="any" onclick="selectMealReq(this)">상관없음</button>
            <button class="pill" data-meal="after" onclick="selectMealReq(this)">식사 후</button>
            <button class="pill" data-meal="before" onclick="selectMealReq(this)">식사 전</button>
          </div>

          <button class="btn-calc" onclick="addTask()">추가하기 ✅</button>
        </div>

        <div class="section-title">📍 현재 위치별 할 일</div>
        <div class="location-tabs">
          <button class="loc-tab active" data-loc="all" onclick="switchLocTab(this, 'all')">전체</button>
          <button class="loc-tab" data-loc="home" onclick="switchLocTab(this, 'home')">🏠 집</button>
          <button class="loc-tab" data-loc="school" onclick="switchLocTab(this, 'school')">🏫 학교</button>
          <button class="loc-tab" data-loc="anywhere" onclick="switchLocTab(this, 'anywhere')">🌍 어디서나</button>
        </div>

        <div id="task-list" class="task-list"></div>
      </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="home" onclick="goTo('home')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-btn" data-page="travel" onclick="goTo('travel')">
        <span class="nav-icon">🚌</span>
        <span class="nav-label">이동</span>
      </button>
      <button class="nav-btn" data-page="nearby" onclick="goTo('nearby')">
        <span class="nav-icon">📍</span>
        <span class="nav-label">주변</span>
      </button>
      <button class="nav-btn" data-page="tasks" onclick="goTo('tasks')">
        <span class="nav-icon">📋</span>
        <span class="nav-label">할 일</span>
      </button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
